<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}feed.xml">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ .Site.BaseURL }}" class="site-logo">
        <span class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="7" stroke="white" stroke-width="2"/>
            <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <rect x="7" y="11" width="2" height="3" rx="0.5" fill="white"/>
            <rect x="10" y="8" width="2" height="6" rx="0.5" fill="white"/>
            <rect x="13" y="10" width="2" height="4" rx="0.5" fill="white"/>
          </svg>
        </span>
        <span class="logo-text">Budget Watch</span>
      </a>
      <nav class="main-nav">
        <a href="{{ .Site.BaseURL }}reports/">Reports</a>
        <a href="{{ .Site.BaseURL }}briefs/">Policy Briefs</a>
        <a href="{{ .Site.BaseURL }}map/">Map</a>
        <a href="{{ .Site.BaseURL }}team/">Team</a>
        <a href="{{ .Site.BaseURL }}about/">About</a>
        <a href="{{ .Site.BaseURL }}apply/">Apply</a>
        <a href="{{ .Site.BaseURL }}action/" class="nav-cta">Take Action</a>
      </nav>
      <button class="search-btn" id="search-btn" aria-label="Search reports and briefs" title="Search (press /)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10.5" cy="10.5" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="15.8" y1="15.8" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="mobile-menu-btn" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" hidden>
    <div class="search-panel">
      <div class="search-input-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="15.8" y1="15.8" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search reports and briefs…" autocomplete="off" aria-label="Search">
        <button class="search-close" id="search-close" aria-label="Close search">Esc</button>
      </div>
      <div class="search-results" id="search-results" data-index-url="{{ "index.json" | absURL }}"></div>
    </div>
  </div>

  <main>{{ block "main" . }}{{ end }}</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo-icon" style="width:28px;height:28px;border-radius:7px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="7" stroke="white" stroke-width="2"/>
            <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <rect x="7" y="11" width="2" height="3" rx="0.5" fill="white"/>
            <rect x="10" y="8" width="2" height="6" rx="0.5" fill="white"/>
            <rect x="13" y="10" width="2" height="4" rx="0.5" fill="white"/>
          </svg>
        </span>
        <span style="font-weight:700">Budget Watch</span>
      </div>
      <div class="footer-links">
        <a href="{{ .Site.BaseURL }}reports/">Reports</a>
        <a href="{{ .Site.BaseURL }}briefs/">Policy Briefs</a>
        <a href="{{ .Site.BaseURL }}map/">Map</a>
        <a href="{{ .Site.BaseURL }}team/">Team</a>
        <a href="{{ .Site.BaseURL }}about/">About</a>
        <a href="{{ .Site.BaseURL }}apply/">Apply</a>
        <a href="{{ .Site.BaseURL }}action/">Take Action</a>
        <a href="{{ .Site.BaseURL }}feed.xml">RSS</a>
      </div>
      <p class="footer-tagline">You pay taxes. You deserve to know where the money goes.</p>
    </div>
  </footer>

  <script>
  (function () {
    var overlay = document.getElementById('search-overlay');
    var input = document.getElementById('search-input');
    var results = document.getElementById('search-results');
    var indexData = null;

    function openSearch() {
      overlay.hidden = false;
      document.body.style.overflow = 'hidden';
      input.value = '';
      results.innerHTML = '<div class="search-hint">Type to search all reports and policy briefs</div>';
      setTimeout(function () { input.focus(); }, 30);
      if (!indexData) {
        fetch(results.dataset.indexUrl)
          .then(function (r) { return r.json(); })
          .then(function (d) { indexData = d || []; })
          .catch(function () { indexData = []; });
      }
    }
    function closeSearch() {
      overlay.hidden = true;
      document.body.style.overflow = '';
    }
    function escHtml(s) {
      return s.replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function render(q) {
      if (!q.trim()) {
        results.innerHTML = '<div class="search-hint">Type to search all reports and policy briefs</div>';
        return;
      }
      if (!indexData) {
        results.innerHTML = '<div class="search-hint">Loading…</div>';
        return;
      }
      var terms = q.toLowerCase().split(/\s+/).filter(Boolean);
      var hits = indexData.filter(function (it) {
        var hay = (it.title + ' ' + it.meta + ' ' + it.summary).toLowerCase();
        return terms.every(function (t) { return hay.indexOf(t) !== -1; });
      }).slice(0, 10);
      if (!hits.length) {
        results.innerHTML = '<div class="search-hint">No matches for “' + escHtml(q) + '”</div>';
        return;
      }
      results.innerHTML = hits.map(function (it) {
        return '<a class="search-result" href="' + escHtml(it.url) + '">' +
          '<span class="search-result-type ' + (it.type === 'Report' ? 'sr-report' : 'sr-brief') + '">' + it.type + '</span>' +
          '<span class="search-result-body"><span class="search-result-title">' + escHtml(it.title) + '</span>' +
          '<span class="search-result-meta">' + escHtml(it.meta) + '</span></span></a>';
      }).join('');
    }
    if (overlay && input) {
      document.getElementById('search-btn').addEventListener('click', openSearch);
      document.getElementById('search-close').addEventListener('click', closeSearch);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeSearch(); });
      input.addEventListener('input', function () { render(input.value); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !overlay.hidden) closeSearch();
        if (e.key === '/' && overlay.hidden && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) {
          e.preventDefault();
          openSearch();
        }
      });
    }

    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var header = document.querySelector('.site-header');
    window.addEventListener('scroll', function () {
      header.classList.toggle('scrolled', window.scrollY > 8);
    }, { passive: true });

    var targets = document.querySelectorAll(
      '.featured-report, .report-card, .brief-home-card, .brief-card, .method-card, ' +
      '.about-do-card, .about-method-step, .about-cta-card, .trait-card, .topic-card, ' +
      '.featured-brief, .section-header-row, .apply-banner-inner, .about-impact-item, ' +
      '.action-step, .action-stat, .action-phase, .action-source'
    );
    if (!reduced) {
      var pending = [];
      targets.forEach(function (el, i) {
        el.classList.add('reveal');
        el.style.transitionDelay = (Math.min(i % 6, 4) * 60) + 'ms';
        pending.push(el);
      });

      var counters = [];
      document.querySelectorAll('.stat-num, .page-hero-stat-num, .about-impact-num').forEach(function (el) {
        var m = el.textContent.trim().match(/^(\$?)(\d+)(\+?)$/);
        if (!m || parseInt(m[2], 10) === 0) return;
        counters.push({ el: el, prefix: m[1], target: parseInt(m[2], 10), suffix: m[3], done: false });
        el.textContent = m[1] + '0' + m[3];
      });

      function countUp(c) {
        var start = null, dur = 900;
        function tick(ts) {
          if (!start) start = ts;
          var p = Math.min((ts - start) / dur, 1);
          var eased = 1 - Math.pow(1 - p, 3);
          c.el.textContent = c.prefix + Math.round(c.target * eased) + c.suffix;
          if (p < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function check() {
        var vh = window.innerHeight || document.documentElement.clientHeight || Infinity;
        pending = pending.filter(function (el) {
          if (el.getBoundingClientRect().top < vh - 40) {
            el.classList.add('in');
            return false;
          }
          return true;
        });
        counters.forEach(function (c) {
          if (!c.done && c.el.getBoundingClientRect().top < vh) {
            c.done = true;
            countUp(c);
          }
        });
        if (!pending.length && counters.every(function (c) { return c.done; })) {
          window.removeEventListener('scroll', check);
          window.removeEventListener('resize', check);
        }
      }
      window.addEventListener('scroll', check, { passive: true });
      window.addEventListener('resize', check);
      check();
    }
  })();
  </script>
</body>
</html>
