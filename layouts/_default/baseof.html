<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}feed.xml">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ .Site.BaseURL }}" class="site-logo">
        <span class="logo-mark">BW</span>
        <span class="logo-text">Budget Watch</span>
      </a>
      <nav class="main-nav">
        <a href="{{ .Site.BaseURL }}reports/">Research</a>
        <a href="{{ .Site.BaseURL }}map/">Map</a>
        <a href="{{ .Site.BaseURL }}about/">About</a>
        <a href="{{ .Site.BaseURL }}apply/">Apply</a>
        <a href="{{ .Site.BaseURL }}submit/" class="nav-cta">Submit a Report</a>
      </nav>
      <button class="mobile-menu-btn" onclick="document.querySelector('.main-nav').classList.toggle('open')">☰</button>
    </div>
  </header>

  <main>{{ block "main" . }}{{ end }}</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo-mark" style="font-size:.9rem">BW</span>
        <span style="font-weight:700">Budget Watch</span>
      </div>
      <div class="footer-links">
        <a href="{{ .Site.BaseURL }}reports/">Research</a>
        <a href="{{ .Site.BaseURL }}map/">Map</a>
        <a href="{{ .Site.BaseURL }}about/">About</a>
        <a href="{{ .Site.BaseURL }}apply/">Apply</a>
        <a href="{{ .Site.BaseURL }}submit/">Submit</a>
        <a href="{{ .Site.BaseURL }}feed.xml">RSS</a>
      </div>
      <p class="footer-tagline">You pay taxes. You deserve to know where the money goes.</p>
    </div>
  </footer>
</body>
</html>
