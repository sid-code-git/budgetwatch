<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "feed.xml" | absURL }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ "/" | absURL }}" class="site-title">Budget Watch</a>
      <nav>
        <a href="{{ "/reports/" | absURL }}">Reports</a>
        <a href="{{ "/map/" | absURL }}">Map</a>
        <a href="{{ "/methodology/" | absURL }}">Methodology</a>
        <a href="{{ "/about/" | absURL }}">About</a>
        <a href="{{ "/submit/" | absURL }}" class="nav-cta">Submit a Town</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Budget Watch · <a href="{{ "feed.xml" | absURL }}">RSS Feed</a> · <a href="{{ "/methodology/" | absURL }}">How we analyze</a></p>
      <p class="footer-note">You pay taxes. You deserve to know where the money goes. We report facts and raise questions — every figure cited to its source.</p>
    </div>
  </footer>
</body>
</html>
